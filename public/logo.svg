<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Outer glow ring -->
  <circle cx="150" cy="150" r="140" fill="url(#outerGrad)" />
  <!-- Inner white circle -->
  <circle cx="150" cy="150" r="128" fill="white" />
  <!-- Thin orange inner border -->
  <circle cx="150" cy="150" r="128" fill="none" stroke="#E8680A" stroke-width="2.5" />

  <defs>
    <radialGradient id="outerGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF9A30"/>
      <stop offset="60%" stop-color="#E8620A"/>
      <stop offset="100%" stop-color="#B84A00"/>
    </radialGradient>
    <radialGradient id="pinGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF9A30"/>
      <stop offset="100%" stop-color="#E8620A"/>
    </radialGradient>
  </defs>

  <!-- Location pin shape -->
  <path d="M150 48
    C126 48 107 67 107 91
    C107 112 127 136 150 162
    C173 136 193 112 193 91
    C193 67 174 48 150 48 Z"
    fill="url(#pinGrad)" />

  <!-- Pin inner white circle -->
  <circle cx="150" cy="91" r="31" fill="white" />

  <!-- Compass rose inside pin (simplified) -->
  <g transform="translate(150, 73)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#E8620A" stroke-width="1.5"/>
    <polygon points="0,-9 2.5,-4 -2.5,-4" fill="#E8620A"/>
    <polygon points="0,9 2.5,4 -2.5,4" fill="#C85000"/>
    <polygon points="-9,0 -4,2.5 -4,-2.5" fill="#C85000"/>
    <polygon points="9,0 4,2.5 4,-2.5" fill="#C85000"/>
    <circle cx="0" cy="0" r="2" fill="#E8620A"/>
  </g>

  <!-- Rice bowl inside pin -->
  <g transform="translate(150, 104)">
    <!-- Bowl -->
    <ellipse cx="0" cy="0" rx="16" ry="7" fill="#E8620A"/>
    <path d="M-16,0 Q-16,12 0,14 Q16,12 16,0 Z" fill="#E8620A"/>
    <!-- Rice mound -->
    <ellipse cx="0" cy="-2" rx="13" ry="6" fill="white" opacity="0.9"/>
    <!-- Steam dots -->
    <circle cx="-4" cy="-9" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="0" cy="-10" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="4" cy="-9" r="1.5" fill="white" opacity="0.7"/>
    <!-- Base line -->
    <rect x="-18" y="13" width="36" height="3" rx="1.5" fill="#E8620A"/>
  </g>

  <!-- Chopsticks -->
  <g transform="translate(150, 90)" stroke="#7B2D00" stroke-width="2.5" stroke-linecap="round">
    <line x1="-3" y1="-22" x2="8" y2="8"/>
    <line x1="3" y1="-24" x2="12" y2="4"/>
  </g>

  <!-- Mountain silhouettes behind pin (left) -->
  <path d="M60 168 L90 130 L120 168 Z" fill="#E8620A" opacity="0.85"/>
  <!-- Mountain silhouettes behind pin (right) -->
  <path d="M180 168 L210 130 L240 168 Z" fill="#E8620A" opacity="0.85"/>

  <!-- Korean roof left -->
  <path d="M50 175 Q75 158 100 170 L100 180 Q75 168 50 185 Z" fill="#7B2D00"/>
  <!-- Korean roof right -->
  <path d="M250 175 Q225 158 200 170 L200 180 Q225 168 250 185 Z" fill="#7B2D00"/>

  <!-- Decorative spoon (left side) -->
  <g transform="translate(48, 150)" fill="#E8620A">
    <ellipse cx="0" cy="0" rx="7" ry="9" />
    <rect x="-2" y="8" width="4" height="18" rx="2"/>
  </g>

  <!-- Decorative fork (right side) -->
  <g transform="translate(252, 150)" stroke="#E8620A" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="-3" y1="-10" x2="-3" y2="4"/>
    <line x1="0" y1="-10" x2="0" y2="4"/>
    <line x1="3" y1="-10" x2="3" y2="4"/>
    <path d="M-3,4 Q0,8 3,4" />
    <line x1="0" y1="8" x2="0" y2="22"/>
  </g>

  <!-- 여행한입 main text -->
  <text x="150" y="218"
    text-anchor="middle"
    font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="36"
    font-weight="900"
    fill="#7B2D00"
    letter-spacing="-1"
  >여행한입</text>

  <!-- Subtitle -->
  <text x="150" y="242"
    text-anchor="middle"
    font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#7B2D00"
  >한국 여행지의 맛집 이야기</text>
</svg>
