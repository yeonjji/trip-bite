<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 185" width="220" height="185">
  <g fill="#5C2208">

    <!-- ── Swoosh arc (orbit around building) ── -->
    <path d="M38 112 Q110 132 182 112" stroke="#5C2208" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- ── Airplane (lower-left) ── -->
    <g transform="translate(28,100) rotate(-38)">
      <ellipse cx="0" cy="0" rx="14" ry="4"/>
      <path d="M-4,-2 L-14,-12 L-3,-6 Z"/>
      <path d="M-4,2 L-14,12 L-3,6 Z"/>
      <path d="M-12,-2 L-18,-7 L-13,0 Z"/>
    </g>

    <!-- ── Korean traditional building (한옥) ── -->
    <!-- building body -->
    <rect x="68" y="72" width="84" height="40" rx="2"/>
    <!-- door/window grid -->
    <rect x="74" y="80" width="10" height="22" rx="1.5" fill="#8B3C12"/>
    <rect x="88" y="80" width="10" height="22" rx="1.5" fill="#8B3C12"/>
    <rect x="102" y="80" width="10" height="22" rx="1.5" fill="#8B3C12"/>
    <rect x="116" y="80" width="10" height="22" rx="1.5" fill="#8B3C12"/>
    <rect x="130" y="80" width="10" height="22" rx="1.5" fill="#8B3C12"/>
    <!-- side pillars -->
    <rect x="68" y="72" width="3" height="40"/>
    <rect x="149" y="72" width="3" height="40"/>

    <!-- Lower roof (wider) -->
    <path d="M52,72 Q110,46 168,72 Z"/>
    <!-- Upper roof (narrower) -->
    <path d="M72,54 Q110,32 148,54 Z"/>
    <!-- Ridge cap -->
    <rect x="100" y="28" width="20" height="5" rx="2.5"/>

    <!-- ── Location pin ── -->
    <ellipse cx="110" cy="20" rx="13" ry="12"/>
    <path d="M100,28 Q110,46 110,46 Q110,46 120,28 Z"/>
    <circle cx="110" cy="19" r="5" fill="white"/>

    <!-- ── Bottle (upper-right of pin) ── -->
    <g transform="translate(120,8)">
      <rect x="0" y="5" width="9" height="6" rx="2"/>
      <rect x="1" y="0" width="7" height="6" rx="2"/>
      <path d="M-2,11 Q-4,16 -3,28 L12,28 Q13,16 11,11 Z"/>
    </g>

  </g>

  <!-- ── TRIP BITE ── -->
  <text
    x="110"
    y="148"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Arial Bold', sans-serif"
    font-size="34"
    font-weight="900"
    fill="#5C2208"
    letter-spacing="3"
  >TRIP BITE</text>

  <!-- ── 여행 한입 ── -->
  <text
    x="110"
    y="172"
    text-anchor="middle"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-size="15"
    font-weight="400"
    fill="#5C2208"
    letter-spacing="6"
  >여행 한입</text>
</svg>
