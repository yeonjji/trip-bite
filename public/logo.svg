<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer red circle (thick border) -->
  <circle cx="100" cy="100" r="98" fill="#C8392B" />
  <!-- Cream inner fill -->
  <circle cx="100" cy="100" r="86" fill="#F5EFE0" />
  <!-- Inner thin red ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#C8392B" stroke-width="2" />
  <circle cx="100" cy="100" r="79" fill="none" stroke="#C8392B" stroke-width="1.5" />

  <!-- TB large text -->
  <text
    x="100"
    y="92"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="700"
    fill="#C8392B"
    letter-spacing="4"
  >TB</text>

  <!-- Horizontal divider lines -->
  <line x1="38" y1="104" x2="162" y2="104" stroke="#C8392B" stroke-width="2.5"/>
  <line x1="38" y1="108" x2="162" y2="108" stroke="#C8392B" stroke-width="1"/>

  <!-- KOREA text with dots -->
  <text
    x="100"
    y="138"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="600"
    fill="#C8392B"
    letter-spacing="5"
  >•KOREA•</text>
</svg>
