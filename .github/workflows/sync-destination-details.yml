name: sync-destination-details

# destinations.intro_data / image_data 백필 (intro_data IS NULL인 row만 처리, resume 지원)
# KST 02:00 (UTC 17:00) 매일 실행. 수동 실행도 가능.

on:
  # PR1 후속: 스케줄 비활성화 (sync-destination-intros.yml / sync-destination-images.yml로 분할됨).
  # 수동 실행은 rollback용으로 유지. PR3에서 파일 자체 삭제 예정.
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GitHub Actions 최대 6h 한도 내. TourAPI 한도에 막히면 자체 종료.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backfill
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: node scripts/sync-destination-details.mjs
