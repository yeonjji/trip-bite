name: sync-destination-intros

# detailIntro2 м†БмЮђ вАФ destination_introsмЧР row мЧЖлКФ destinationлІМ м≤Шл¶ђ
# KST 02:00 (UTC 17:00) лІ§мЭЉ мЛ§нЦЙ. мИШлПЩ мЛ§нЦЙлПД к∞АлК•.

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backfill
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: node scripts/sync-destination-intros.mjs
